<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#165DFF",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0f1523",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .geometric-bg {
            background-color: #f5f6f8;
            background-image: radial-gradient(at 0% 0%, rgba(22, 93, 255, 0.05) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(22, 93, 255, 0.08) 0px, transparent 50%);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex flex-col">
<!-- Top Navigation for Language Switcher -->
<header class="flex items-center justify-between px-6 py-4 lg:px-12 w-full absolute top-0 z-10">
<div class="flex items-center gap-2">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-xl" style="">rocket_launch</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight" style="">SaasNext</h1>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" style="">
<span class="material-symbols-outlined text-lg" style="">language</span>
<span class="" style="">简体中文</span>
<span class="material-symbols-outlined text-sm" style="">expand_more</span>
</button>
</div>
</header>
<!-- Main Content Area with Geometric Background -->
<main class="flex-1 flex items-center justify-center p-6 geometric-bg relative overflow-hidden">
<!-- Decorative Elements -->
<div class="absolute top-20 left-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-20 right-10 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
<!-- Login Card -->
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900 shadow-xl border border-slate-200/60 dark:border-slate-800 rounded-xl overflow-hidden relative z-20">
<div class="p-8 lg:p-10">
<div class="mb-8">
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2" style="">欢迎回来</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm" style="">请输入您的账号信息以访问管理后台</p>
</div>
<!-- Form -->
<form class="space-y-5">
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" style="">电子邮箱</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl" style="">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="name@company.com" type="email">
</div>
</div>
<div>
<div class="flex justify-between items-center mb-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" style="">密码</label>
<a class="text-sm font-medium text-primary hover:underline" href="#" style="">忘记密码？</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl" style="">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="请输入密码" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button" style="">
<span class="material-symbols-outlined text-xl" style="">visibility</span>
</button>
</div>
</div>
<div class="flex items-center">
<input class="w-4 h-4 text-primary bg-slate-100 border-slate-300 rounded focus:ring-primary focus:ring-2" id="remember" type="checkbox">
<label class="ml-2 text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember" style="">30天内记住我</label>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-4 rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2" type="submit" style="">
                        立即登录
                        <span class="material-symbols-outlined text-lg" style="">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-white dark:bg-slate-900 text-slate-500 dark:text-slate-400" style="">或使用社交账号登录</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-2.5 px-4 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-slate-700 dark:text-slate-300 font-medium text-sm" style="">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 py-2.5 px-4 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-slate-700 dark:text-slate-300 font-medium text-sm" style="">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" fill="currentColor"></path>
</svg>
                        GitHub
                    </button>
</div>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm" style="">
                        还没有账号？
                        <a class="text-primary font-bold hover:underline ml-1" href="#" style="">立即注册</a>
</p>
</div>
</div>
</div>
<!-- Background Card (Stacking effect) -->
<div class="absolute w-[440px] h-20 bg-primary/20 -bottom-2 rounded-xl blur-xl opacity-50 z-10"></div>
</main>
<!-- Footer -->
<footer class="py-6 px-12 text-center text-slate-400 dark:text-slate-600 text-xs">
<div class="flex items-center justify-center gap-6 mb-2">
<a class="hover:text-slate-600 dark:hover:text-slate-400 transition-colors" href="#" style="">使用条款</a>
<a class="hover:text-slate-600 dark:hover:text-slate-400 transition-colors" href="#" style="">隐私政策</a>
<a class="hover:text-slate-600 dark:hover:text-slate-400 transition-colors" href="#" style="">帮助中心</a>
</div>
<p class="" style="">© 2024 CloudSaaS Technology Inc. 保留所有权利</p>
</footer>
</body></html>
