name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0" # 每周日运行

jobs:
  # 1. 依赖审计与 Snyk 扫描
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # 2. SAST 静态代码分析 (CodeQL)
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # 3. Semgrep 扫描 (Next.js 专项)
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/typescript
            p/react
            p/nextjs
            p/owasp-top-ten
            p/jwt
            p/secrets

  # 4. Secret 泄露检测
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 5. Next.js 增强检查
  nextjs-security:
    name: Next.js Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci

      # 检查 .env 文件未被提交
      - name: Check .env not committed
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.local$|^\.env\.production$'; then
            echo "❌ .env files should not be committed!"
            exit 1
          fi
          echo "✅ No .env files committed"

  # 6. 安全门禁 (Security Gate)
  security-gate:
    name: Security Gate
    needs: [dependency-audit, codeql, semgrep, secret-scan, nextjs-security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.dependency-audit.result }}" != "success" || \
                "${{ needs.codeql.result }}" != "success" || \
                "${{ needs.semgrep.result }}" != "success" || \
                "${{ needs.secret-scan.result }}" != "success" || \
                "${{ needs.nextjs-security.result }}" != "success" ]]; then
            echo "❌ Security checks failed!"
            exit 1
          fi
          echo "✅ All security checks passed!"
